name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.tag_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: tag_version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify version matches package.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.tag_version.outputs.version }}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PACKAGE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version $PACKAGE_VERSION matches tag"

      - name: Build package
        run: npm run build

      - name: Verify build output
        run: |
          MISSING=""
          for f in dist/index.js dist/index.mjs dist/index.d.ts \
                   dist/react/index.js dist/react/index.mjs dist/react/index.d.ts \
                   dist/css/styles.css; do
            [ ! -f "$f" ] && MISSING="$MISSING $f"
          done
          if [ -n "$MISSING" ]; then
            echo "Error: Missing build output:$MISSING"
            exit 1
          fi
          REACT_REFS=$(grep -c 'react' dist/index.mjs || true)
          if [ "$REACT_REFS" -gt 0 ]; then
            echo "Error: Server bundle contains React references ($REACT_REFS)"
            exit 1
          fi
          HEAD=$(head -c 14 dist/react/index.mjs)
          if [ "$HEAD" != '"use client";' ]; then
            echo "Error: React bundle missing 'use client' directive"
            exit 1
          fi
          echo "✓ Build verified"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
          retention-days: 7
          if-no-files-found: error

  publish-npm:
    name: Publish to npm
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Publish to npm
        run: npm publish --access public --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    name: Create GitHub Release
    needs: [build, publish-npm]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | sed '$d' > release_notes.md 2>/dev/null || true
          if [ ! -s release_notes.md ]; then
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." > release_notes.md
          fi

      - name: Create dist zip
        run: zip -r buildbase-sdk-${{ github.ref_name }}.zip dist/

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            ./buildbase-sdk-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
