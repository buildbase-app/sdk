name: Build and Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Extract version from tag
        id: tag_version
        run: |
          # Remove refs/tags/ prefix
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          if [[ "$TAG_NAME" == v* ]]; then
            TAG_VERSION=${TAG_NAME#v}
          else
            TAG_VERSION=$TAG_NAME
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag name: $TAG_NAME"
          echo "Extracted version: $TAG_VERSION"

      - name: Verify version matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.tag_version.outputs.version }}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Package version ($PACKAGE_VERSION) doesn't match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version verified: $PACKAGE_VERSION"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION=${{ steps.tag_version.outputs.version }}
          # Extract changelog entry for this version
          awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | sed '$d' > release_notes.md || \
          awk "/^## \[$VERSION\]/,/^$/" CHANGELOG.md > release_notes.md
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create dist zip
        run: |
          cd dist
          zip -r ../buildbase-sdk-${{ github.ref_name }}.zip .

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            ./buildbase-sdk-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: tag_version
        run: |
          # Remove refs/tags/ prefix
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          if [[ "$TAG_NAME" == v* ]]; then
            TAG_VERSION=${TAG_NAME#v}
          else
            TAG_VERSION=$TAG_NAME
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag name: $TAG_NAME"
          echo "Extracted version: $TAG_VERSION"

      - name: Verify version matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.tag_version.outputs.version }}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Package version ($PACKAGE_VERSION) doesn't match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version verified: $PACKAGE_VERSION"

      - name: Build package
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.js" ] || [ ! -f "dist/index.esm.js" ]; then
            echo "Error: Build output files missing"
            exit 1
          fi
          echo "✓ Build output verified"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
