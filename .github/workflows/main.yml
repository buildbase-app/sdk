name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (typecheck + theme-token guard)
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Extract version from tag
        id: tag_version
        run: |
          # Remove refs/tags/ prefix
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          if [[ "$TAG_NAME" == v* ]]; then
            TAG_VERSION=${TAG_NAME#v}
          else
            TAG_VERSION=$TAG_NAME
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag name: $TAG_NAME"
          echo "Extracted version: $TAG_VERSION"

      - name: Verify version matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.tag_version.outputs.version }}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Package version ($PACKAGE_VERSION) doesn't match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version verified: $PACKAGE_VERSION"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION=${{ steps.tag_version.outputs.version }}
          # Print lines between this version's heading and the next "## [" heading.
          # Uses an explicit flag (not an awk range) so it is independent of awk
          # flavor and never terminates early on the heading line itself.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { inblock=1; next }
            inblock && /^## \[/ { exit }
            inblock { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Error: no CHANGELOG entry found for version $VERSION"
            exit 1
          fi

      - name: Create dist zip
        run: |
          cd dist
          zip -r ../buildbase-sdk-${{ github.ref_name }}.zip .

      - name: Create Release
        # Notes are passed as a FILE, never inlined into the script — markdown
        # backticks in the changelog are command substitutions to bash and were
        # executed (and broke the quoting) when interpolated via ${{ }}.
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            ./buildbase-sdk-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: tag_version
        run: |
          # Remove refs/tags/ prefix
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          if [[ "$TAG_NAME" == v* ]]; then
            TAG_VERSION=${TAG_NAME#v}
          else
            TAG_VERSION=$TAG_NAME
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag name: $TAG_NAME"
          echo "Extracted version: $TAG_VERSION"

      - name: Verify version matches package.json
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${{ steps.tag_version.outputs.version }}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Package version ($PACKAGE_VERSION) doesn't match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ Version verified: $PACKAGE_VERSION"

      - name: Build package
        run: npm run build

      - name: Verify build output
        run: |
          echo "Checking build output..."
          MISSING=""
          for f in dist/index.cjs dist/index.mjs dist/index.d.ts \
                   dist/react/index.cjs dist/react/index.mjs dist/react/index.d.ts \
                   dist/data/index.cjs dist/data/index.mjs dist/data/index.d.ts \
                   dist/css/styles.css; do
            if [ ! -f "$f" ]; then
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "Error: Missing build output files:$MISSING"
            exit 1
          fi
          # Verify server bundle has no React
          REACT_REFS=$(grep -c 'react' dist/index.mjs || true)
          if [ "$REACT_REFS" -gt 0 ]; then
            echo "Error: Server bundle contains React references ($REACT_REFS)"
            exit 1
          fi
          # Verify react bundle has "use client" directive
          HEAD=$(head -c 14 dist/react/index.mjs)
          if [ "$HEAD" != '"use client";' ]; then
            echo "Error: React bundle missing 'use client' directive"
            exit 1
          fi
          echo "✓ Build output verified (server: no React, react: has 'use client')"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}